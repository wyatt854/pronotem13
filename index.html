<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M13 Studio — Espace scolaire</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- =============================================
     ÉCRAN DE CONNEXION
     ============================================= -->
<div id="login-screen" class="login-page">
  <div class="login-card">
    <!-- En-tête -->
    <div class="login-top">
      <div class="login-logo">M13 STUDIO
        <span>Espace Scolaire Numérique</span>
      </div>
    </div>

    <!-- Corps -->
    <div class="login-body">
      <p style="font-size:13px;color:#546E7A;text-align:center;margin-bottom:20px">
        Sélectionnez votre rôle puis entrez vos identifiants pour accéder à votre espace.
      </p>

      <!-- Sélection du rôle -->
      <div class="role-selector" id="role-selector">
        <button class="role-btn" onclick="selectRole('acteur', this)">
          <span class="role-icon">🎓</span>
          <span class="role-name">ACTEUR</span>
          <span class="role-desc">Élève ou intervenant en cours</span>
        </button>
        <button class="role-btn" onclick="selectRole('moderateur', this)">
          <span class="role-icon">🎭</span>
          <span class="role-name">MODÉRATEUR</span>
          <span class="role-desc">Vie scolaire, emploi du temps</span>
        </button>
        <button class="role-btn" onclick="selectRole('realisateur', this)">
          <span class="role-icon">🎬</span>
          <span class="role-name">RÉALISATEUR</span>
          <span class="role-desc">Directeur, administration</span>
        </button>
      </div>
      <input type="hidden" id="selected-role" value="">

      <!-- Formulaire -->
      <div class="form-group">
        <label class="form-label">Identifiant</label>
        <input class="form-control" type="text" id="login-ident" placeholder="Votre identifiant" 
          autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('login-pwd').focus()">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <div style="position:relative">
          <input class="form-control" type="password" id="login-pwd" placeholder="Votre mot de passe"
            autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"
            style="padding-right:40px">
          <button onclick="togglePwd()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px" id="eye-btn">👁️</button>
        </div>
      </div>

      <div id="login-error" class="alert alert-danger hidden" style="margin-top:8px"></div>

      <button class="btn btn-primary" id="btn-login" onclick="login()" style="width:100%;margin-top:8px;padding:11px">
        Se connecter
      </button>

      <p style="text-align:center;font-size:11.5px;color:#90A4AE;margin-top:16px">
        🔒 Accès réservé aux membres de M13 Studio.<br>
        Contactez le Réalisateur pour obtenir un compte.
      </p>
    </div>
  </div>
</div>

<!-- =============================================
     APPLICATION PRINCIPALE
     ============================================= -->
<div id="app" style="display:none">

  <!-- TOPBAR -->
  <div class="topbar">
    <a href="#" class="topbar-logo" onclick="navigate(currentRole==='acteur'?'mondashboard':'dashboard')">
      M13<span>Studio</span>
    </a>
    <div class="topbar-spacer"></div>

    <!-- Notifs messages -->
    <div class="topbar-notif" onclick="navigate('messages')" title="Messages">
      ✉️
      <div class="notif-badge" id="notif-msg" style="display:none">0</div>
    </div>

    <!-- Utilisateur -->
    <div class="topbar-user">
      <div class="avatar" id="user-initials">?</div>
      <div>
        <div style="font-weight:600;font-size:12.5px" id="user-name">Chargement...</div>
        <div style="font-size:11px;opacity:0.75" id="user-role-badge"></div>
      </div>
      <button onclick="logout()" class="btn" style="background:rgba(255,255,255,0.15);color:white;border:none;padding:5px 10px;font-size:12px;margin-left:4px" title="Déconnexion">⏻</button>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <nav id="sidebar-nav"></nav>
  </div>

  <!-- CONTENU PRINCIPAL -->
  <div class="main-content">

    <!-- PAGE: Dashboard admin/modo -->
    <div class="page" id="page-dashboard"></div>

    <!-- PAGE: Élèves -->
    <div class="page" id="page-eleves"></div>

    <!-- PAGE: Profs -->
    <div class="page" id="page-profs"></div>

    <!-- PAGE: Classes -->
    <div class="page" id="page-classes"></div>

    <!-- PAGE: EDT -->
    <div class="page" id="page-edt"></div>

    <!-- PAGE: Absences -->
    <div class="page" id="page-absences"></div>

    <!-- PAGE: Notes -->
    <div class="page" id="page-notes"></div>

    <!-- PAGE: Cahier de textes -->
    <div class="page" id="page-cahier"></div>

    <!-- PAGE: Messages -->
    <div class="page" id="page-messages"></div>

    <!-- PAGE: Sanctions -->
    <div class="page" id="page-sanctions"></div>

    <!-- PAGE: Bulletins -->
    <div class="page" id="page-bulletins"></div>

    <!-- PAGE: Gestion comptes (réalisateur) -->
    <div class="page" id="page-comptes"></div>

    <!-- PAGE: Matières (réalisateur) -->
    <div class="page" id="page-matieres"></div>

    <!-- PAGE: Dashboard acteur -->
    <div class="page" id="page-mondashboard"></div>

    <!-- PAGE: Mes notes (acteur) -->
    <div class="page" id="page-monnotes"></div>

    <!-- PAGE: Mes absences (acteur) -->
    <div class="page" id="page-monAbsences"></div>

  </div>
</div>

<!-- =============================================
     MODALE GÉNÉRIQUE
     ============================================= -->
<div class="modal-overlay" id="generic-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Titre</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- =============================================
     SCRIPTS
     ============================================= -->
<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>
<script src="js/app.js"></script>

<script>
// Sélection du rôle sur la page de connexion
function selectRole(role, btn) {
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('selected-role').value = role;
}

// Toggle mot de passe visible
function togglePwd() {
  const i = document.getElementById('login-pwd');
  i.type = i.type === 'password' ? 'text' : 'password';
  document.getElementById('eye-btn').textContent = i.type === 'password' ? '👁️' : '🙈';
}
</script>

</body>
</html>
